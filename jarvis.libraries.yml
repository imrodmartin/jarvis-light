global:
  version: 1.x
  css:
    base:
      libraries/bootstrap/css/bootstrap.min.css: { minified: true }
      css/overrides.css: {}
  js:
    libraries/bootstrap/js/bootstrap.bundle.min.js: { minified: true, attributes: { defer: true } }

color-settings:
  version: 1.x
  css:
    theme:
      css/color-settings.css: {}
  js:
    js/color-settings.js: {}
  dependencies:
    - core/once
    - core/drupal

font-settings:
  version: 1.x
  css:
    theme:
      css/font-settings.css: {}
  js:
    js/font-settings.js: {}
  dependencies:
    - core/once
    - core/drupal
    - core/drupalSettings
