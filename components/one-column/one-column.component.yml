$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: '1 Column'
status: stable
description: 'Single-column row. Content spans the full width.'
category: 'Jarvis Layout'
props:
  type: object
  properties:
    width:
      title: 'Section width'
      type: string
      enum: [boxed, full]
      'meta:enum':
        boxed: 'Boxed (centred)'
        full: 'Full width'
      default: boxed
    gap:
      title: 'Column gap'
      type: string
      enum: [none, small, normal, large]
      'meta:enum':
        none: None
        small: Small
        normal: Normal
        large: Large
      default: normal
      examples:
        - normal
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: false
slots:
  first:
    title: Column
    description: 'Components placed in this column.'
