$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Text
status: stable
description: 'Rich text block with width and alignment controls.'
category: Jarvis
props:
  type: object
  required:
    - body
  properties:
    body:
      title: Body
      type: string
      contentMediaType: text/html
      'x-formatting-context': block
      examples:
        - '<h2>Section heading</h2><p>Body copy with <strong>rich text</strong> support.</p>'
    width:
      title: Width
      type: string
      enum: [narrow, normal, wide]
      'meta:enum':
        narrow: Narrow
        normal: Normal
        wide: Wide
      default: normal
      examples:
        - normal
    align:
      title: Alignment
      type: string
      enum: [start, center, end]
      'meta:enum':
        start: Left
        center: Center
        end: Right
      default: start
      examples:
        - start
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: false
