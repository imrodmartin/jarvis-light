$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Section
status: stable
description: 'Container/section wrapper that holds other components in its slot.'
category: Jarvis
props:
  type: object
  properties:
    width:
      title: Width
      type: string
      enum: [normal, full]
      'meta:enum':
        normal: 'Contained'
        full: 'Full width'
      default: normal
      examples:
        - normal
    bg:
      title: 'Background'
      type: string
      enum: [none, light, dark, primary, body-tertiary]
      'meta:enum':
        none: None
        light: Light
        dark: Dark
        primary: Primary
        body-tertiary: 'Subtle grey'
      default: none
      examples:
        - none
    padding:
      title: Padding
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    padding_size:
      title: 'Padding size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    margin:
      title: Margin
      type: string
      enum: [none, all, top, bottom, left, right]
      'meta:enum':
        none: None
        all: 'All sides'
        top: Top
        bottom: Bottom
        left: Left
        right: Right
      default: none
    margin_size:
      title: 'Margin size'
      type: string
      enum: [small, medium, large]
      'meta:enum':
        small: 'Small (10px)'
        medium: 'Medium (20px)'
        large: 'Large (30px)'
      default: medium
    vertical_padding:
      title: 'Vertical padding (30px)'
      type: boolean
      default: false
    no_padding:
      title: 'Remove padding (let content touch)'
      type: boolean
      default: false
slots:
  content:
    title: Content
    description: 'Components placed inside this section.'
